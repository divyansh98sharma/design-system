name: Bulk Generate AngularJS Directives

on:
  workflow_dispatch:
    inputs:
      components:
        description: |
          Comma-separated list of components to generate.
          Leave blank to generate all 24 components.
        required: false
        default: ''
        type: string
      resume:
        description: 'Skip components that already have a generated directive'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  bulk-generate:
    name: Bulk generate AngularJS directives
    runs-on: ubuntu-latest
    # Allow up to 60 min — 24 components × ~2 min each (AI call + write)
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      # Node 22 — native fetch; generate scripts need no npm install
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [bot]"

      - name: Create bulk-generate branch
        run: git checkout -b feat/angularjs-bulk-generate

      # Provider chain: first available key wins (GitHub Models is the free fallback).
      # Add ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY / GROQ_API_KEY
      # as repo secrets for better output quality.
      - name: Generate all directives
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.components }}" ]; then
            ARGS="$ARGS --components ${{ inputs.components }}"
          fi
          if [ "${{ inputs.resume }}" = "true" ]; then
            ARGS="$ARGS --resume"
          fi
          node scripts/bulk-generate-angularjs.mjs $ARGS

      # Run parity check — warn mode (not --strict) in case some components failed.
      # The job already exits 1 from the script if any generation failed.
      - name: Run parity check
        run: node scripts/check-mirror.mjs
        continue-on-error: true  # surface warnings without double-failing the job

      - name: Commit generated directives
        id: commit
        run: |
          git add src/ds-angularjs/
          if git diff --cached --quiet; then
            echo "nothing=true" >> $GITHUB_OUTPUT
            echo "Nothing to commit — all files unchanged."
          else
            COUNT=$(git diff --cached --name-only | grep '\.directive\.ts$' | wc -l | tr -d ' ')
            git commit -m "feat(angularjs): bulk-generate ${COUNT} AngularJS directives [AI]

          Auto-generated by scripts/bulk-generate-angularjs.mjs
          Components: ${{ inputs.components || 'all' }}

          Each directive mirrors its Angular 21 counterpart in src/ds/.
          Review each .directive.ts before merging — AI output is a starting point.

          Co-Authored-By: GitHub Actions <actions@github.com>"
            echo "count=${COUNT}" >> $GITHUB_OUTPUT
          fi

      - name: Push branch
        if: steps.commit.outputs.nothing != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push -u origin feat/angularjs-bulk-generate --force-with-lease

      - name: Open PR
        if: steps.commit.outputs.nothing != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMPONENTS="${{ inputs.components }}"
          LABEL="${COMPONENTS:-all 24 components}"
          COUNT="${{ steps.commit.outputs.count }}"

          # Close any existing PR for this branch before opening a new one
          gh pr close feat/angularjs-bulk-generate --delete-branch 2>/dev/null || true
          git push -u origin feat/angularjs-bulk-generate --force-with-lease 2>/dev/null || true

          gh pr create \
            --title "feat(angularjs): bulk-generate AngularJS directives [AI] ($LABEL)" \
            --body "$(cat <<EOF
          ## What

          AI-generated AngularJS 1.x directives for **${LABEL}**.

          **${COUNT} file(s)** added under \`src/ds-angularjs/\`.

          > ⚠️ These files were generated automatically. **Review each directive carefully before merging.**
          > The AI is seeded with the full Angular 21 source + a concrete example, but generated code
          > may need manual adjustments (complex computed properties, DI patterns, PrimeNG wrappers).

          ---

          ## Per-component review checklist

          For each \`.directive.ts\` in this PR:

          - [ ] All \`@Input()\` bindings → \`'<'\` scope key with identical name
          - [ ] All \`@Output()\` bindings → \`'&'\` scope key (\`buttonClick\` → \`onButtonClick\`)
          - [ ] Template renders the component correctly with \`ng-*\` directives
          - [ ] BEM CSS class names match the Angular 21 template exactly
          - [ ] No hardcoded hex values — uses \`var(--...)\` tokens throughout
          - [ ] SVG inputs handled via \`\$sce.trustAsHtml()\` (if applicable)

          Run locally to validate parity:
          \`\`\`bash
          node scripts/check-mirror.mjs
          \`\`\`

          ---

          ## Next step after merge

          Enable strict coverage enforcement in CI:

          In \`.github/workflows/check-mirror.yml\`, replace:
          \`\`\`yaml
              run: node scripts/check-mirror.mjs
          \`\`\`
          with:
          \`\`\`yaml
              run: node scripts/check-mirror.mjs --strict
          \`\`\`

          ---

          ## Part of AngularJS dual-framework rollout

          | Branch | PR | Status |
          |--------|-----|--------|
          | 1 — Scaffold | #281 | Open |
          | 2 — CI parity | #282 | Open |
          | 3 — PR template | #283 | Open |
          | 4 — AI action | #284 | Open |
          | **5 — Bulk generate** | **this PR** | **Open** |
          | 6 — Publish | — | Pending |
          | 7 — Docs | — | Pending |

          🤖 Generated with [Claude Code](https://claude.com/claude-code)
          EOF
          )" \
            --base main \
            --head feat/angularjs-bulk-generate

      - name: Write step summary
        if: always()
        run: |
          echo "### Bulk Generate Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Components | \`${{ inputs.components || 'all' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Resume mode | \`${{ inputs.resume }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Files committed | \`${{ steps.commit.outputs.count || '0' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`feat/angularjs-bulk-generate\` |" >> $GITHUB_STEP_SUMMARY
