name: Generate AngularJS Directive

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component name (e.g. button, chip, toggle)'
        required: true
        type: string
      open_pr:
        description: 'Open a PR after generation'
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    name: Generate ${{ inputs.component }} directive
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      # Node 22 — native fetch available; generate-angularjs.mjs needs no npm install
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Configure git
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions [bot]"

      - name: Create generation branch
        run: git checkout -b "feat/angularjs-gen/${{ inputs.component }}"

      # Provider chain: first key that is set and succeeds wins.
      # GITHUB_TOKEN is always available (free GitHub Models fallback).
      # Add ANTHROPIC_API_KEY / OPENAI_API_KEY / GOOGLE_API_KEY / GROQ_API_KEY
      # as repo secrets for higher-quality models.
      - name: Generate directive
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY:    ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-angularjs.mjs ${{ inputs.component }}

      - name: Run parity check
        run: node scripts/check-mirror.mjs
        # Fails the job if the generated directive is missing scope bindings.
        # check-mirror.mjs exits 0 (warn) if package-angularjs.json isn't merged yet.

      - name: Commit generated file
        run: |
          git add src/ds-angularjs/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "feat(angularjs): generate ${{ inputs.component }} directive [AI]

          Auto-generated by scripts/generate-angularjs.mjs
          Component: src/ds/${{ inputs.component }}/${{ inputs.component }}.component.ts

          Co-Authored-By: GitHub Actions <actions@github.com>"

      - name: Push branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push -u origin "feat/angularjs-gen/${{ inputs.component }}"

      - name: Open PR
        if: ${{ inputs.open_pr }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "feat(angularjs): ${{ inputs.component }} directive [AI-generated]" \
            --body "$(cat <<'EOF'
          ## What

          AI-generated AngularJS 1.x directive mirroring the Angular 21 \`${{ inputs.component }}\` component.

          **Source:** \`src/ds/${{ inputs.component }}/${{ inputs.component }}.component.ts\`
          **Output:** \`src/ds-angularjs/${{ inputs.component }}/${{ inputs.component }}.directive.ts\`

          > ⚠️ This file was generated automatically. Please review carefully before merging.

          ---

          ## Review checklist

          - [ ] All `@Input()` bindings have a matching `'<'` scope key
          - [ ] All `@Output()` bindings have a matching `'&'` scope key with `on`-prefix
          - [ ] Template renders the component correctly using `ng-*` directives
          - [ ] BEM CSS class names match the Angular 21 template exactly
          - [ ] `node scripts/check-mirror.mjs` exits 0 ✅ (CI enforces this)
          - [ ] Manually smoke-tested in an AngularJS host app (if possible)

          ---

          Part of the Angular 21 ↔ AngularJS mirror — see PR #281 for scaffold context.
          EOF
          )" \
            --base main \
            --head "feat/angularjs-gen/${{ inputs.component }}"

      - name: Summary
        if: always()
        run: |
          echo "### Generation complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Component | \`${{ inputs.component }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`feat/angularjs-gen/${{ inputs.component }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | \`src/ds-angularjs/${{ inputs.component }}/${{ inputs.component }}.directive.ts\` |" >> $GITHUB_STEP_SUMMARY
