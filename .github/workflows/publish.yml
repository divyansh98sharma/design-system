name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish library
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC) — no token needed

    steps:
      - uses: actions/checkout@v6

      # NOTE: deliberately NO `registry-url` here. When set, setup-node writes an
      # .npmrc with a placeholder _authToken, which makes npm attempt token auth
      # (and fail) instead of the OIDC trusted-publishing handshake. The registry
      # and public access come from package.json `publishConfig` instead.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Update npm (Trusted Publishing needs npm >= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      # No NODE_AUTH_TOKEN / .npmrc token: npm authenticates via the OIDC
      # trusted-publisher rule configured for this repo + workflow on npmjs.com.
      - name: Publish to npm
        run: npm publish ./dist/ecw-ds --provenance
