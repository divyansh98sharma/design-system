name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish library
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC) — no token needed

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) and provenance require npm >= 11.5.1;
      # Node 22 ships npm 10, so bump it.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      # No NODE_AUTH_TOKEN: authentication happens via the OIDC handshake once
      # this repo + workflow is set as a Trusted Publisher on the npm package.
      - name: Publish to npm
        run: npm publish ./dist/ecw-ds --provenance
        working-directory: ${{ github.workspace }}
