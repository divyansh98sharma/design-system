name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Build & publish library
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v6

      # registry-url makes setup-node write the registry into the userconfig
      # .npmrc (npm needs that to anchor the OIDC exchange). It ALSO writes a
      # placeholder _authToken, which we strip below so npm uses OIDC instead
      # of attempting (failed) token auth.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm + force OIDC (strip placeholder token)
        run: |
          npm install -g npm@latest
          npm --version
          if [ -n "$NPM_CONFIG_USERCONFIG" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            sed -i.bak '/_authToken/d' "$NPM_CONFIG_USERCONFIG"
            echo "---- userconfig .npmrc after stripping token ----"
            cat "$NPM_CONFIG_USERCONFIG"
          fi

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build library
        run: npm run build:lib

      # No token configured -> npm authenticates via the OIDC trusted-publisher
      # rule (divyansh98sharma/design-system + publish.yml) on npmjs.com.
      - name: Publish to npm
        run: npm publish ./dist/ecw-ds --provenance
