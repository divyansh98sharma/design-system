name: Storybook Tests

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  interaction-and-a11y-tests:
    name: Interaction & Accessibility Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      - name: Serve Storybook and run tests
        run: |
          npx http-server storybook-static --port 6006 --silent &
          npx wait-on tcp:6006
          npx test-storybook --url http://localhost:6006

  chromatic:
    name: Visual Tests (Chromatic)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # The project token lives in the Actions secret store, which is NOT exposed
      # to Dependabot-triggered runs (those read the separate Dependabot secret
      # store). When the token is absent we skip the visual snapshot and let the
      # required check pass — dependency bumps don't change rendered output, and
      # this is consistent with the auto-accept behaviour below. To run real
      # visual diffs on Dependabot PRs too, add CHROMATIC_PROJECT_TOKEN under
      # Settings → Secrets and variables → Dependabot.
      - name: Check Chromatic token availability
        id: token
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: |
          if [ -n "$CHROMATIC_PROJECT_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CHROMATIC_PROJECT_TOKEN not available (likely a Dependabot run) — skipping visual snapshot and passing the check."
          fi

      - name: Run Chromatic
        if: steps.token.outputs.available == 'true'
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # TurboSnap (onlyChanged) requires a preview-stats.json that the
          # @storybook/angular builder does not emit, which made every run fail
          # with "missing stats file". Snapshot all stories instead.
          # Dependabot bumps dev/runtime deps only — no visual diffs expected,
          # so auto-accept baselines for it to keep the check green.
          autoAcceptChanges: ${{ github.actor == 'dependabot[bot]' }}
          exitZeroOnChanges: ${{ github.actor == 'dependabot[bot]' }}
