<div class="ds-ai-bubbles" role="group" [attr.aria-label]="ariaLabel">
  @if (showHintIcon) {
    <span class="ds-ai-bubbles__hint" aria-hidden="true" [innerHTML]="safeHintIcon"></span>
  }

  @for (chip of chips; track trackByIndex($index); let i = $index) {
    <button
      type="button"
      class="ds-ai-bubbles__chip"
      (click)="onChipClick(chip, i)"
    >
      @if (chip.icon) {
        <span class="ds-ai-bubbles__chip-icon" aria-hidden="true" [innerHTML]="safeChipIcon(chip)"></span>
      }
      <span class="ds-ai-bubbles__chip-label">{{ chip.label }}</span>
    </button>
  }
</div>
