<div [ngClass]="hostClasses">
  @if (isText) {
    <span class="ds-avatar__text">{{ initials }}</span>
  }

  @if (isImage) {
    <img class="ds-avatar__img" [src]="imageUrl" [alt]="imageAlt">
  }

  @if (isDummy) {
    <svg class="ds-avatar__dummy-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
    </svg>
  }
</div>
