<div [ngClass]="hostClasses">
  <!-- Text variant: initials via p-avatar label -->
  @if (isText) {
    <div class="p-avatar p-avatar-circle ds-avatar__inner">
      <span class="p-avatar-text">{{ initials }}</span>
    </div>
  }

  <!-- Image variant: photo via p-avatar image -->
  @if (isImage) {
    <div class="p-avatar p-avatar-circle ds-avatar__inner" [attr.aria-label]="imageAlt">
      <img [src]="imageUrl" [alt]="imageAlt">
    </div>
  }

  <!-- Dummy variant: placeholder person icon -->
  @if (isDummy) {
    <div class="p-avatar p-avatar-circle ds-avatar__inner">
      <svg class="ds-avatar__dummy-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="12" cy="8" r="4" fill="currentColor"/>
        <path d="M4 20c0-4.418 3.582-8 8-8s8 3.582 8 8" fill="currentColor"/>
      </svg>
    </div>
  }
</div>
