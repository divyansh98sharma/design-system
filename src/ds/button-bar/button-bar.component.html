<div class="ds-button-bar" role="toolbar" [attr.aria-label]="'Button bar'">
  <!-- Left section -->
  <div class="ds-button-bar__section ds-button-bar__section--left">
    @if (showSelectAll) {
      <ds-checkbox
        [checked]="selectAllChecked"
        [indeterminate]="selectAllIndeterminate"
        [label]="selectAllLabel"
        (checkedChange)="onSelectAllChange($event)">
      </ds-checkbox>
      <span class="ds-button-bar__divider" aria-hidden="true"></span>
    }

    @for (action of leftActions; track trackAction($index, action); let i = $index) {
      <button
        type="button"
        class="ds-button-bar__action"
        [disabled]="action.disabled"
        (click)="onActionClick('left', i, action)">
        <span class="ds-button-bar__action-label">{{ action.label }}</span>
        @if (action.trailingIcon !== 'none') {
          <svg class="ds-button-bar__action-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            @if ((action.trailingIcon ?? 'chevron-down') === 'chevron-down') {
              <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            } @else {
              <path d="M3 7.5L6 4.5L9 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            }
          </svg>
        }
      </button>
    }

    @if (showSort) {
      <span class="ds-button-bar__divider" aria-hidden="true"></span>
      <button
        type="button"
        class="ds-button-bar__action ds-button-bar__action--icon-only"
        [attr.aria-label]="sortLabel"
        (click)="sortClick.emit()">
        <svg class="ds-button-bar__action-icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M4 2v8m0 0L2 8m2 2l2-2M10 12V4m0 0l-2 2m2-2l2 2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    }
  </div>

  <!-- Right section -->
  <div class="ds-button-bar__section ds-button-bar__section--right">
    @for (action of rightActions; track trackAction($index, action); let i = $index) {
      <button
        type="button"
        class="ds-button-bar__action"
        [disabled]="action.disabled"
        (click)="onActionClick('right', i, action)">
        <span class="ds-button-bar__action-label">{{ action.label }}</span>
        @if (action.trailingIcon !== 'none') {
          <svg class="ds-button-bar__action-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            @if ((action.trailingIcon ?? 'chevron-down') === 'chevron-down') {
              <path d="M3 4.5L6 7.5L9 4.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            } @else {
              <path d="M3 7.5L6 4.5L9 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            }
          </svg>
        }
      </button>
    }

    @if (showMore) {
      <span class="ds-button-bar__divider" aria-hidden="true"></span>
      <button
        type="button"
        class="ds-button-bar__action"
        (click)="moreClick.emit()">
        <span class="ds-button-bar__action-label">{{ moreLabel }}</span>
        <svg class="ds-button-bar__action-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M3 7.5L6 4.5L9 7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    }
  </div>
</div>
