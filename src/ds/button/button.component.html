<button
  type="button"
  class="p-button"
  [class]="styleClass"
  [ngClass]="themeClass"
  [disabled]="disabled"
  [attr.aria-disabled]="disabled || null"
  (click)="onClick($event)"
>
  @if (hasIcon && iconPosition === 'left') {
    @if (customIconTemplate) {
      <span class="p-button-icon p-button-icon-left" aria-hidden="true">
        <ng-container *ngTemplateOutlet="customIconTemplate"></ng-container>
      </span>
    } @else {
      <span class="p-button-icon p-button-icon-left" [innerHTML]="safeIcon" aria-hidden="true"></span>
    }
  }

  @if (!isIconOnly) {
    <span class="p-button-label">{{ label }}</span>
  }

  @if (hasIcon && iconPosition === 'right') {
    @if (customIconTemplate) {
      <span class="p-button-icon p-button-icon-right" aria-hidden="true">
        <ng-container *ngTemplateOutlet="customIconTemplate"></ng-container>
      </span>
    } @else {
      <span class="p-button-icon p-button-icon-right" [innerHTML]="safeIcon" aria-hidden="true"></span>
    }
  }

  @if (hasIcon && isIconOnly) {
    @if (customIconTemplate) {
      <span class="p-button-icon" aria-hidden="true">
        <ng-container *ngTemplateOutlet="customIconTemplate"></ng-container>
      </span>
    } @else {
      <span class="p-button-icon" [innerHTML]="safeIcon" aria-hidden="true"></span>
    }
  }
</button>
