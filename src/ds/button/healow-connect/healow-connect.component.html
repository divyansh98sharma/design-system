<button
  class="ds-healow-connect"
  [class]="'ds-healow-connect ds-healow-connect--' + state"
  [disabled]="isDisabled"
  [attr.aria-disabled]="isDisabled"
  [attr.aria-label]="isCallInProgress ? 'Call in progress — Disconnect healow' : 'Connect via healow'"
  type="button"
  (click)="handleClick()"
>
  <!-- Healow icon (16 × 16) ───────────────────────────────────── -->
  <svg
    class="ds-healow-connect__icon"
    viewBox="0 0 16 16"
    aria-hidden="true"
    xmlns="http://www.w3.org/2000/svg"
  >
    <!-- Outer circle ring -->
    <circle cx="8" cy="8" r="6.5" fill="none" stroke-width="1"/>
    <!-- Signal arcs (wifi-style) -->
    <path d="M4.5 11 a4.95 4.95 0 0 1 7 0"
          fill="none" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M5.8 9 a3.1 3.1 0 0 1 4.4 0"
          fill="none" stroke-width="1.1" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="8" cy="8.8" r="0.9"/>
  </svg>

  <!-- Label ──────────────────────────────────────────────────── -->
  <span class="ds-healow-connect__label">Connect</span>
</button>
