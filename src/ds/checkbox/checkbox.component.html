<label
  class="ds-checkbox"
  [class.ds-checkbox--disabled]="disabled"
>
  <button
    type="button"
    role="checkbox"
    class="ds-checkbox__box"
    [class.ds-checkbox__box--checked]="checked && !indeterminate"
    [class.ds-checkbox__box--indeterminate]="indeterminate"
    [attr.aria-checked]="indeterminate ? 'mixed' : checked"
    [attr.aria-disabled]="disabled || null"
    [attr.aria-label]="ariaLabel"
    [disabled]="disabled"
    (click)="toggle()"
  >
    @if (checked && !indeterminate) {
      <svg class="ds-checkbox__icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4.66667 11.0833L1.16667 7.58334L2.33333 6.41668L4.66667 8.75001L11.6667 1.75001L12.8333 2.91668L4.66667 11.0833Z" fill="currentColor"/>
      </svg>
    }
    @if (indeterminate) {
      <svg class="ds-checkbox__icon" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M2.91667 6.41666H11.0833V7.58332H2.91667V6.41666Z" fill="currentColor"/>
      </svg>
    }
  </button>

  @if (hasLabel) {
    <span class="ds-checkbox__label">{{ label }}</span>
  }
</label>
