<div [ngClass]="hostClasses" (click)="chipClick.emit()">

  @if (showIcon) {
    <svg
      class="ds-chip__icon"
      viewBox="0 0 24 24"
      fill="currentColor"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <path [attr.d]="resolvedIconPath"/>
    </svg>
  }

  <span class="ds-chip__label">{{ label }}</span>

  @if (showCounter) {
    <span class="ds-chip__counter">{{ counterLabel }}</span>
  }

</div>
