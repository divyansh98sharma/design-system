<span [class]="hostClass" (click)="chipClick.emit()">
  @if (showIcon) {
    <span class="ds-chip__icon" aria-hidden="true">
      @if (safeIcon) {
        <span [innerHTML]="safeIcon"></span>
      } @else {
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2.5" y="2.5" width="11" height="11" rx="1"/>
        </svg>
      }
    </span>
  }
  <span class="ds-chip__label">{{ label }}</span>
  @if (showCounter) {
    <span class="ds-chip__counter">{{ counter }}</span>
  }
</span>
