<div class="ds-disclaimer" [class.ds-disclaimer--note]="type === 'note'" [class.ds-disclaimer--disclaimer]="type === 'disclaimer'" role="note">
  <p class="ds-disclaimer__body">
    <strong class="ds-disclaimer__prefix">{{ prefix }}</strong>
    <span class="ds-disclaimer__text"> {{ text }}</span>
  </p>

  @if (showClose) {
    <button
      type="button"
      class="ds-disclaimer__close"
      aria-label="Dismiss"
      (click)="closed.emit()"
    >
      <svg viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12.59 3.41L11.17 2 8 5.17 4.83 2 3.41 3.41 6.59 6.59 3.41 9.76 4.83 11.17 8 7.99l3.17 3.18 1.42-1.41L9.41 6.59z"/>
      </svg>
    </button>
  }
</div>
