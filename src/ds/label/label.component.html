<label
  class="ds-label"
  [class.ds-label--large]="size === 'large'"
  [class.ds-label--fixed]="fixedWidth"
  [attr.for]="for"
>
  <span class="ds-label__text">
    <ng-content>{{ text }}</ng-content>
  </span>
  @if (required) {
    <span class="ds-label__required" aria-hidden="true">*</span>
  }
  @if (showInfo) {
    <button
      type="button"
      class="ds-label__info-btn"
      [title]="infoTooltip"
      [attr.aria-label]="infoTooltip || 'More information'"
      (click)="infoClick.emit()"
    >
      <svg class="ds-label__icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="8" cy="8" r="6.8" stroke="currentColor" stroke-width="1.2"/>
        <rect x="7.3" y="7" width="1.3" height="4.3" fill="currentColor"/>
        <circle cx="8" cy="5.3" r="0.8" fill="currentColor"/>
      </svg>
    </button>
  }
  @if (showCaret) {
    <button
      type="button"
      class="ds-label__caret-btn"
      aria-label="Toggle options"
      (click)="caretClick.emit()"
    >
      <svg class="ds-label__icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  }
</label>
