<div [ngClass]="modalClasses">

  <!-- ─── Header ──────────────────────────────────────────────────────────── -->
  <div class="ds-modal__header">

    <div class="ds-modal__header-left">
      <span class="ds-modal__heading">{{ heading }}</span>

      @if (showDirtyFlag) {
        <span class="ds-modal__dirty-flag" title="You have unsaved changes" aria-label="Unsaved changes">
          <svg class="ds-modal__dirty-icon" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 1L1 14h14L8 1zm0 2.18L13.54 13H2.46L8 3.18zM7 7v3h2V7H7zm0 4v2h2v-2H7z"/>
          </svg>
        </span>
      }
    </div>

    <!-- Right: projected header actions + close button -->
    <div class="ds-modal__header-right">
      <ng-content select="[header-actions]"></ng-content>
      <button
        class="ds-modal__close-btn"
        type="button"
        (click)="closed.emit()"
        aria-label="Close modal"
      >
        <svg class="ds-modal__close-icon" viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M15.59 4.41L14.17 3 10 7.17 5.83 3 4.41 4.41 8.59 8.59 4.41 12.76 5.83 14.17 10 9.99l4.17 4.18 1.42-1.41L11.41 8.59z"/>
        </svg>
      </button>
    </div>

  </div>

  <!-- ─── Body (projected content) ───────────────────────────────────────── -->
  <div class="ds-modal__body">
    <ng-content></ng-content>
  </div>

  <!-- ─── Footer ──────────────────────────────────────────────────────────── -->
  <div class="ds-modal__footer">

    <!-- Left side actions -->
    <div class="ds-modal__footer-left">
      @for (action of footerLeftActions; track action.label) {
        <button
          [ngClass]="['ds-modal__action-btn', 'ds-modal__action-btn--' + (action.variant ?? 'secondary')]"
          type="button"
          (click)="onAction(action)"
        >{{ action.label }}</button>
      }
    </div>

    <!-- Right side actions -->
    <div class="ds-modal__footer-right">
      @for (action of footerRightActions; track action.label) {
        <button
          [ngClass]="['ds-modal__action-btn', 'ds-modal__action-btn--' + (action.variant ?? 'secondary')]"
          type="button"
          (click)="onAction(action)"
        >{{ action.label }}</button>
      }
    </div>

  </div>

</div>
