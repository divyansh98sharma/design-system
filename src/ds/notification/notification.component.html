<div [ngClass]="cardClasses">

  <!-- Badge dot (balloon alert indicator) -->
  @if (badgePosition) {
    <span class="ds-notification__badge" aria-hidden="true"></span>
  }

  <!-- Left sidebar — coloured strip with type icon -->
  <div class="ds-notification__sidebar">
    <div class="ds-notification__icon-wrap">
      <svg
        class="ds-notification__icon"
        [attr.viewBox]="iconViewBox"
        fill="currentColor"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
      >
        <path [attr.d]="iconPath"/>
      </svg>
    </div>
  </div>

  <!-- Right content area -->
  <div class="ds-notification__body">

    <!-- Header -->
    <div class="ds-notification__header">
      <div class="ds-notification__heading">
        <span class="ds-notification__window-name">{{ windowName }}</span>
        <span class="ds-notification__sep"> - </span>
        <span class="ds-notification__description">{{ description }}</span>
      </div>
      <div class="ds-notification__text">{{ bodyText }}</div>
    </div>

    <!-- Footer -->
    <div class="ds-notification__footer">

      <!-- Optional suppress checkbox -->
      @if (showCheckbox) {
        <label class="ds-notification__checkbox-label">
          <input
            type="checkbox"
            class="ds-notification__checkbox"
            [checked]="suppressChecked"
            (change)="onSuppressChange($event)"
          />
          <span class="ds-notification__checkbox-text">{{ checkboxLabel }}</span>
        </label>
      }

      <!-- Action buttons -->
      <div class="ds-notification__actions">
        @for (action of actions; track action.label) {
          <button
            class="ds-notification__action-btn"
            type="button"
            (click)="onAction(action)"
          >{{ action.label }}</button>
        }
      </div>

    </div>
  </div>

</div>
