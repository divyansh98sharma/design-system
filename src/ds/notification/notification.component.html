<div [ngClass]="cardClasses">

  <!-- ── Circular icon badge ──────────────────────────────────────── -->
  <div class="ds-notification__icon-badge">
    <svg class="ds-notification__icon" viewBox="0 0 24 24" aria-hidden="true">
      <path [attr.d]="iconPath"/>
    </svg>
  </div>

  <!-- ── Text container ───────────────────────────────────────────── -->
  <div class="ds-notification__text">

    <div class="ds-notification__header">
      <div class="ds-notification__heading">
        <span class="ds-notification__window-name">{{ windowName }}</span>
        <span class="ds-notification__heading-dash">-</span>
        <span class="ds-notification__description">{{ description }}</span>
      </div>
      <p class="ds-notification__body" [innerHTML]="bodyText"></p>
    </div>

    <div class="ds-notification__footer">

      <div class="ds-notification__footer-left">
        @if (showCheckbox) {
          <label class="ds-notification__checkbox">
            <input
              type="checkbox"
              [checked]="suppressChecked"
              (change)="onSuppressChange($event)"
            />
            <span>{{ checkboxLabel }}</span>
          </label>
        }
      </div>

      <div class="ds-notification__footer-right">
        @for (action of actions; track action.label) {
          <button
            [ngClass]="['ds-notification__action-btn', 'ds-notification__action-btn--' + (action.variant ?? 'secondary')]"
            type="button"
            (click)="onAction(action)"
          >{{ action.label }}</button>
        }
      </div>

    </div>

  </div>

</div>
