<nav class="ds-pagination" aria-label="Pagination">
  <span class="ds-pagination__label">Show</span>
  <select
    class="ds-pagination__select"
    [ngModel]="pageSize"
    (ngModelChange)="onSizeChange($event)"
    aria-label="Items per page"
  >
    @for (opt of pageSizeOptions; track opt) {
      <option [ngValue]="opt">{{ opt }}</option>
    }
  </select>

  <span class="ds-pagination__label">of {{ totalItems }} {{ itemLabel }}</span>

  <button
    type="button"
    class="ds-pagination__btn"
    aria-label="First page"
    [disabled]="page === 1"
    (click)="first()"
  ><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5 3v10H3.5V3H5zm6 0L5.5 8 11 13l1-1-4-4 4-4-1-1z"/></svg></button>

  <button
    type="button"
    class="ds-pagination__btn"
    aria-label="Previous page"
    [disabled]="page === 1"
    (click)="prev()"
  ><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M10.5 3L5 8l5.5 5 1-1L7.5 8l4-4-1-1z"/></svg></button>

  <input
    class="ds-pagination__input"
    type="number"
    inputmode="numeric"
    aria-label="Current page"
    [value]="page"
    (input)="onPageInput($any($event.target).value)"
  />
  <span class="ds-pagination__label">of {{ totalPages }}</span>

  <button
    type="button"
    class="ds-pagination__btn"
    aria-label="Next page"
    [disabled]="page === totalPages"
    (click)="next()"
  ><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M5.5 3L11 8l-5.5 5-1-1L8.5 8l-4-4 1-1z"/></svg></button>

  <button
    type="button"
    class="ds-pagination__btn"
    aria-label="Last page"
    [disabled]="page === totalPages"
    (click)="last()"
  ><svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M11 3v10h1.5V3H11zm-6 0L4 4l4 4-4 4 1 1 5-5-5-5z"/></svg></button>
</nav>
