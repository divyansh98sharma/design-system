<section
  class="ds-patient-summary"
  [class.ds-patient-summary--on-card]="onCard"
  [class.ds-patient-summary--filled]="filled"
  [attr.aria-label]="title"
>
  <header class="ds-patient-summary__header">
    <span class="ds-patient-summary__icon" aria-hidden="true">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 1.5l1.5 3.3 3.3 1.5-3.3 1.5L8 11.1 6.5 7.8 3.2 6.3l3.3-1.5L8 1.5z"/>
      </svg>
    </span>
    <h3 class="ds-patient-summary__title">{{ title }}</h3>
  </header>

  <div class="ds-patient-summary__body">
    @if (filled) {
      <p>{{ body }}</p>
    } @else {
      <p class="ds-patient-summary__empty">{{ emptyMessage }}</p>
      <button type="button" class="ds-patient-summary__generate" (click)="generate.emit()">{{ generateLabel }}</button>
    }
  </div>
</section>
