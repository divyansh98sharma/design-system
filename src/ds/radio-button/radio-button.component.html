<label
  class="ds-radio"
  [class.ds-radio--disabled]="disabled"
  [class.ds-radio--checked]="checked"
  (click)="select(); $event.preventDefault()"
  (keydown.space)="select(); $event.preventDefault()"
  [attr.tabindex]="disabled ? -1 : 0"
  [attr.aria-checked]="checked"
  [attr.aria-disabled]="disabled"
  role="radio"
>
  <!-- Hidden native input for form accessibility -->
  <input
    type="radio"
    class="ds-radio__input"
    [checked]="checked"
    [disabled]="disabled"
    tabindex="-1"
    aria-hidden="true"
  />

  <!-- Visual circle -->
  <span [ngClass]="buttonClasses">
    <!-- Inner dot — shown when checked -->
    @if (checked) {
      <span class="ds-radio__dot"></span>
    }
  </span>

  <!-- Label -->
  @if (hasLabel) {
    <span class="ds-radio__label">{{ label }}</span>
  }
</label>
