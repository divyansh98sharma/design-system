<div class="ds-stepper" [class.ds-stepper--disabled]="disabled" role="group" [attr.aria-label]="ariaLabel">
  <button
    type="button"
    class="ds-stepper__btn"
    aria-label="Decrement"
    [disabled]="!canDecrement"
    (click)="decrement()"
  >
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <rect x="3" y="7.25" width="10" height="1.5" rx="0.75"/>
    </svg>
  </button>

  <input
    class="ds-stepper__input"
    type="number"
    inputmode="numeric"
    [value]="value"
    [disabled]="disabled"
    [attr.min]="min"
    [attr.max]="max"
    [attr.step]="step"
    (input)="onInputChange($any($event.target).value)"
  />

  <button
    type="button"
    class="ds-stepper__btn"
    aria-label="Increment"
    [disabled]="!canIncrement"
    (click)="increment()"
  >
    <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
      <path d="M7.25 3h1.5v4.25H13v1.5H8.75V13h-1.5V8.75H3v-1.5h4.25z"/>
    </svg>
  </button>
</div>
