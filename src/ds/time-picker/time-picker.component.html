<div class="ds-time-picker">
  <label class="ds-time-picker__label">{{ label }}</label>
  @if (mode === 'single') {
    <input
      class="ds-time-picker__input"
      type="time"
      [value]="value"
      (input)="onTimeChange($any($event.target).value)"
      (focus)="openChange.emit(true)"
    />
  } @else {
    <div class="ds-time-picker__range">
      <input class="ds-time-picker__input" type="time" [(ngModel)]="rangeStart" (ngModelChange)="onRangeChange()" />
      <span class="ds-time-picker__sep">→</span>
      <input class="ds-time-picker__input" type="time" [(ngModel)]="rangeEnd" (ngModelChange)="onRangeChange()" />
    </div>
  }
</div>
