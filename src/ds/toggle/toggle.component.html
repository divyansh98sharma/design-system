<button
  type="button"
  class="ds-toggle"
  role="switch"
  [class.ds-toggle--on]="on && !disabled"
  [class.ds-toggle--off]="!on && !disabled"
  [class.ds-toggle--disabled]="disabled"
  [attr.aria-checked]="on"
  [attr.aria-disabled]="disabled || null"
  [attr.aria-label]="ariaLabel"
  [disabled]="disabled"
  (click)="toggle()"
>
  <span class="ds-toggle__handle" aria-hidden="true"></span>
</button>
