<button
  [ngClass]="pillClasses"
  type="button"
  role="switch"
  [attr.aria-checked]="on"
  [attr.aria-disabled]="disabled"
  [disabled]="disabled"
  (click)="toggle()"
>
  <!-- Thumb -->
  <span class="ds-toggle__thumb">
    <!-- Checkmark — shown when ON -->
    @if (on) {
      <svg class="ds-toggle__icon" viewBox="0 0 10 8" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M1 4L3.5 6.5L9 1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    <!-- X icon — shown when OFF -->
    @if (!on) {
      <svg class="ds-toggle__icon" viewBox="0 0 8 8" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M1 1L7 7M7 1L1 7" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    }
  </span>
</button>
