<nav class="ds-top-nav" aria-label="Application top navigation">

  <!-- ─── Left section ─────────────────────────────────────────────────── -->
  <div class="ds-top-nav__left">

    <!-- Main menu toggle -->
    <div class="ds-top-nav__menu-toggle" (click)="menuToggle.emit()" role="button" tabindex="0" aria-label="Toggle menu">
      <!-- chevron-left -->
      <svg class="ds-top-nav__menu-chevron" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/>
      </svg>
      <!-- hamburger -->
      <svg class="ds-top-nav__menu-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
      </svg>
      <!-- chevron-right -->
      <svg class="ds-top-nav__menu-chevron" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/>
      </svg>
    </div>

    <!-- Logo -->
    <div class="ds-top-nav__logo" aria-label="eClinicalWorks">
      <span class="ds-top-nav__logo-text">e<em>Clinical</em>Works</span>
      <span class="ds-top-nav__logo-sup">®</span>
    </div>

    <!-- Patient lookup -->
    <div
      class="ds-top-nav__lookup"
      role="button"
      tabindex="0"
      aria-label="Patient lookup"
      (click)="patientLookup.emit()"
    >
      <svg class="ds-top-nav__lookup-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <div class="ds-top-nav__lookup-divider"></div>
      <svg class="ds-top-nav__lookup-caret" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M7 10l5 5 5-5z"/>
      </svg>
    </div>

    <!-- Radio indicators -->
    <div class="ds-top-nav__radios">
      <div class="ds-top-nav__radio ds-top-nav__radio--green" aria-label="Radio indicator"></div>
      <div class="ds-top-nav__radio ds-top-nav__radio--green" aria-label="Radio indicator"></div>
    </div>

  </div>

  <!-- ─── Right section: attribute links ───────────────────────────────── -->
  @if (showLinks) {
    <div class="ds-top-nav__links" role="list">

      @if (showRefreshButton) {
        <div class="ds-top-nav__link-cell ds-top-nav__link-cell--refresh" role="listitem">
          <button
            class="ds-top-nav__jellybean ds-top-nav__jellybean--gray"
            type="button"
            aria-label="Refresh"
            (click)="refreshClick.emit()"
          >
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
          </button>
        </div>
      }

      @for (link of links; track link.letter) {
        <div
          class="ds-top-nav__link-cell"
          role="listitem"
          (click)="linkClick.emit(link)"
        >
          <span class="ds-top-nav__link-letter">{{ link.letter }}</span>
          <div
            [ngClass]="[
              'ds-top-nav__jellybean',
              'ds-top-nav__jellybean--' + link.style,
              link.selected ? 'ds-top-nav__jellybean--selected' : ''
            ]"
            [attr.aria-label]="(link.label || link.letter) + ': ' + link.count"
          >{{ link.count }}</div>
        </div>
      }

    </div>
  }

</nav>
